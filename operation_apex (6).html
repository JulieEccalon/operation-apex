<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Operation APEX — SBTW 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#141414;color:#fff;font-family:'Lato',sans-serif}
#root{min-height:100vh}
.screen{min-height:100vh;display:flex;flex-direction:column;padding:1.25rem;max-width:480px;margin:0 auto}
.btn{width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:opacity 0.15s;font-family:inherit}
.btn-primary{background:#8878c3;color:#141414}
.btn-secondary{background:transparent;border:1.5px solid #8878c3;color:#8878c3}
.btn-teal{background:#5CB0B0;color:#141414}
.btn:disabled{opacity:0.35;cursor:not-allowed}
.btn:hover:not(:disabled){opacity:0.85}
input,textarea{width:100%;padding:12px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#fff;font-size:15px;font-family:inherit}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.3)}
input:focus,textarea:focus{outline:none;border-color:#8878c3}
.tag{display:inline-block;padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.progress-bar{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:#8878c3;border-radius:2px;transition:width 0.4s ease}
.choice-btn{width:100%;padding:13px 16px;border-radius:8px;border:1.5px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);color:#fff;font-size:14px;cursor:pointer;text-align:left;transition:all 0.15s;margin-bottom:8px;font-family:inherit}
.choice-btn:hover:not(:disabled){border-color:#8878c3;background:rgba(136,120,195,0.1)}
.choice-btn.selected{border-color:#8878c3;background:rgba(136,120,195,0.18)}
.choice-btn.correct{border-color:#22c55e;background:rgba(34,197,94,0.12);color:#86efac}
.choice-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.08);color:#fca5a5}
.tf-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:1rem}
.stop-card{border-radius:10px;padding:12px;transition:all 0.15s;position:relative}
.stop-card.available{border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);cursor:pointer}
.stop-card.available:hover{border-color:#8878c3;background:rgba(136,120,195,0.08)}
.stop-card.done{cursor:pointer}
.stop-card.locked{border:1px solid rgba(255,255,255,0.06);background:rgba(255,255,255,0.02);opacity:0.45;cursor:default}
.stop-card.unscanned{border:1px dashed rgba(136,120,195,0.35);background:rgba(255,255,255,0.02);cursor:default}
.nav-bar{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.25rem;max-width:480px;margin:0 auto;border-bottom:1px solid rgba(255,255,255,0.1)}
.nav-home{background:none;border:none;color:rgba(255,255,255,0.65);cursor:pointer;font-size:12px;font-family:inherit;letter-spacing:1px;padding:4px 0}
.nav-home:hover{color:#8878c3}
details summary{cursor:pointer;color:rgba(255,255,255,0.5);font-size:12px;padding:4px 0}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:rgba(255,255,255,0.3);font-size:14px">Loading Operation APEX...</div></div>
<script>
// ─── CONFIG ────────────────────────────────────────────────────────
const FIREBASE_DB_URL = "https://sbtw-2026-default-rtdb.firebaseio.com";
const ADMIN_PASS = 'sbtw2026';
const TOTAL_PTS = 500;
const TOTAL_STOPS = 7;
const UNLOCK_THRESHOLD = 6; // complete 6 to unlock stop 7

// ─── CHALLENGES (7 stops) ──────────────────────────────────────────
const CHALLENGES=[
  {id:1,cat:'action',pts:50,title:'Mission Launch',
   desc:'You found it! This is your first stop. Look around and describe one training resource, sign, or display you see here at SBTW — what is it and what does it cover?',
   type:'text',placeholder:'What did you find?'},

  {id:2,cat:'action',pts:50,title:'Report to Station',
   desc:'You made it to the LYNX & APEX Training table. What is one thing you noticed, picked up, or asked the staff while you were here?',
   type:'text',placeholder:'What did you find or ask?'},

  {id:3,cat:'action',pts:50,title:'Field Contact',
   desc:"Talk to someone from a different state's APEX program. What state are they from and what's one thing they told you?",
   type:'text',placeholder:"Their state and one thing they shared..."},

  {id:4,cat:'knowledge',pts:75,title:'LYNX Side by Side',
   desc:'APEX Accelerator advisors use LYNX every day to manage their clients and track their work. Which side of the LYNX platform is built for advisors?',
   type:'mc',
   options:['LYNX Expanse','LYNX Alliance','LYNX Connect','LYNX Navigator'],
   correct:1,
   explain:'LYNX Alliance is the advisor-facing side. LYNX Expanse is what small businesses and industry partners use.'},

  {id:5,cat:'knowledge',pts:75,title:'Know Your Goals',
   desc:'APEX Accelerators are measured on seven goals set by the Department of War each year. Can you name any two of them?',
   type:'text',placeholder:'Name any two goals...'},

  {id:6,cat:'intel',pts:100,title:'Pain Point',
   desc:"Here's your chance to be heard. What is one thing you wish there was training for — LYNX, reporting, DoD goals, or anything else? Your answer goes straight into the next course we build.",
   type:'text',placeholder:"Be honest — what's missing?"},

  {id:7,cat:'intel',pts:100,title:'Mission Debrief',
   desc:"Last stop — you earned it. What is one specific thing you are bringing back to your team from SBTW 2026? Don't be vague. Make it something you'll actually do.",
   type:'text',placeholder:"One thing you're taking home...",locked:true},
];

const CAT_COLOR={action:'#8878c3',knowledge:'#B6A7EC',intel:'#5CB0B0'};
const CAT_LABEL={action:'Action',knowledge:'Knowledge',intel:'Intel'};

// ─── QR / URL DETECTION ───────────────────────────────────────────
const _urlStop=(()=>{
  const p=new URLSearchParams(window.location.search);
  const s=parseInt(p.get('stop'));
  return(s>=1&&s<=TOTAL_STOPS)?s:null;
})();

// ─── STORAGE ──────────────────────────────────────────────────────
function saveLocal(k,v){try{localStorage.setItem('apex_'+k,JSON.stringify(v))}catch(e){}}
function loadLocal(k,d){try{const v=localStorage.getItem('apex_'+k);return v?JSON.parse(v):d}catch(e){return d}}

// ─── FIREBASE ─────────────────────────────────────────────────────
async function fbPush(path,data){
  if(!FIREBASE_DB_URL||FIREBASE_DB_URL.includes('YOUR_'))return;
  try{await fetch(FIREBASE_DB_URL+'/'+path+'.json',{method:'POST',body:JSON.stringify(data)});}catch(e){}
}
async function fbGet(path){
  if(!FIREBASE_DB_URL||FIREBASE_DB_URL.includes('YOUR_'))return null;
  try{const r=await fetch(FIREBASE_DB_URL+'/'+path+'.json');return await r.json();}catch(e){return null}
}
async function fbSet(path,data){
  if(!FIREBASE_DB_URL||FIREBASE_DB_URL.includes('YOUR_'))return;
  try{await fetch(FIREBASE_DB_URL+'/'+path+'.json',{method:'PUT',body:JSON.stringify(data)});}catch(e){}
}
function playerKey(name,team){
  return(name+'__'+team).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'');
}

async function syncFromFirebase(player){
  const data=await fbGet('players/'+playerKey(player.name,player.team));
  if(!data||data.score===undefined)return;
  const remoteMore=(data.completed||[]).length>_gameCompleted.length||data.score>_gameScore;
  if(remoteMore){
    _gameScore=data.score;
    _gameCompleted=data.completed||[];
    _gameScanned=data.scanned||[];
    _gameAnswers=data.answers||{};
    _preNotes=data.preNotes||'';
    saveLocal('score_'+player.name,_gameScore);
    saveLocal('completed_'+player.name,_gameCompleted);
    saveLocal('scanned_'+player.name,_gameScanned);
    saveLocal('answers_'+player.name,_gameAnswers);
    saveLocal('preNotes_'+player.name,_preNotes);
    render();
  }
}

// ─── APP STATE ────────────────────────────────────────────────────
let _state={screen:'landing',player:null,result:null};
function setState(u){
  _state={..._state,...u};
  try{
    const screen=_state.screen;
    if(screen!=='landing'){
      history.pushState({screen},'',(window.location.pathname+'?screen='+screen).replace('?screen=landing',''));
    }
  }catch(e){}
  render();
}

window.addEventListener('popstate',e=>{
  if(e.state&&e.state.screen){
    _state={..._state,screen:e.state.screen};
    if(e.state.screen==='game')_gameView='board';
    render();
  } else {
    _state={..._state,screen:'landing'};
    render();
  }
});

// ─── GAME STATE ───────────────────────────────────────────────────
let _gameIdx=0,_gameScore=0,_gameCompleted=[],_gameScanned=[],_gameAnswers={};
let _gameView='board',_gameFeedback=null,_mcSelected=null,_tfAnswer=null,_revealed=false;
let _preNotes='';

function initGame(player){
  _gameScore=loadLocal('score_'+player.name,0);
  _gameCompleted=loadLocal('completed_'+player.name,[]);
  _gameScanned=loadLocal('scanned_'+player.name,[]);
  _gameAnswers=loadLocal('answers_'+player.name,{});
  _preNotes=loadLocal('preNotes_'+player.name,'');
  _gameView='board';
  _gameFeedback=null;_mcSelected=null;_tfAnswer=null;_revealed=false;
}

function saveGame(player){
  saveLocal('score_'+player.name,_gameScore);
  saveLocal('completed_'+player.name,_gameCompleted);
  saveLocal('scanned_'+player.name,_gameScanned);
  saveLocal('answers_'+player.name,_gameAnswers);
  saveLocal('preNotes_'+player.name,_preNotes);
  fbSet('players/'+playerKey(player.name,player.team),{
    name:player.name,team:player.team,score:_gameScore,
    completed:_gameCompleted,scanned:_gameScanned,
    answers:_gameAnswers,preNotes:_preNotes,lastSaved:Date.now()
  });
}

// ─── LANDING ──────────────────────────────────────────────────────
function Landing(){
  const saved=loadLocal('player',null);
  if(_urlStop&&saved){
    setTimeout(()=>{initGame(saved);handleQrScan(saved,_urlStop);},100);
  }
  return`
  <div class="screen" style="justify-content:space-between;padding-top:3rem;padding-bottom:2rem">
    <div>
      <div style="font-size:10px;letter-spacing:3px;color:#09FFFF;font-weight:700;margin-bottom:1rem;font-family:'Oswald',sans-serif">DEPARTMENT OF WAR · OFFICE OF INDUSTRIAL BASE GROWTH</div>
      <div style="font-size:11px;letter-spacing:3px;color:rgba(255,255,255,0.75);font-weight:600;margin-bottom:0.5rem;font-family:'Oswald',sans-serif">SBTW 2026</div>
      <div style="font-size:58px;font-weight:700;line-height:1;margin-bottom:0.25rem;font-family:'Oswald',sans-serif">OPERATION</div>
      <div style="font-size:58px;font-weight:700;line-height:1;color:#8878c3;margin-bottom:1.5rem;font-family:'Oswald',sans-serif">APEX</div>
      <div style="width:50px;height:3px;background:#8878c3;border-radius:2px;margin-bottom:1.5rem"></div>
      <div style="font-size:15px;color:rgba(255,255,255,0.85);line-height:1.7">Find the QR codes hidden around SBTW, scan them to unlock challenges, earn points, and make it to the top of the leaderboard.</div>
      <div style="margin-top:1.25rem;display:flex;flex-direction:column;gap:6px">
        ${['7 stops hidden around the venue','500 points possible','Prizes for top finishers'].map(t=>`
          <div style="font-size:12px;color:#5CB0B0;display:flex;align-items:center;gap:8px">
            <span style="width:5px;height:5px;border-radius:50%;background:#5CB0B0;display:inline-block;flex-shrink:0"></span>${t}
          </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:2rem">
      <button class="btn btn-primary" onclick="setState({screen:'register'})">Accept Mission</button>
      <button class="btn btn-secondary" style="font-size:13px;padding:10px" onclick="setState({screen:'admin'})">Organizer View</button>
      <div style="text-align:center;font-size:11px;color:rgba(255,255,255,0.35);margin-top:6px">Created by the OBG Training Team</div>
    </div>
  </div>`;
}

// ─── INSTRUCTIONS ─────────────────────────────────────────────────
function Instructions(){
  return`
  <div class="screen" style="padding-top:2rem;padding-bottom:2rem">
    <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:0.5rem;font-family:'Oswald',sans-serif">MISSION BRIEFING</div>
    <div style="font-size:26px;font-weight:700;margin-bottom:1.5rem">Here's how this works</div>
    <div style="display:flex;flex-direction:column;gap:1rem;flex:1">
      <div class="card" style="border-color:rgba(136,120,195,0.3)">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:32px;height:32px;border-radius:50%;background:#8878c3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#141414;flex-shrink:0">1</div>
          <div>
            <div style="font-size:15px;font-weight:700;margin-bottom:4px">Find the QR codes</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.6">7 QR codes are placed around the SBTW venue. Hunt them down — each one unlocks a challenge.</div>
          </div>
        </div>
      </div>
      <div class="card" style="border-color:rgba(136,120,195,0.3)">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:32px;height:32px;border-radius:50%;background:#8878c3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#141414;flex-shrink:0">2</div>
          <div>
            <div style="font-size:15px;font-weight:700;margin-bottom:4px">Scan with your camera</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.6">Open your phone's camera app, point it at the QR code, and tap the link. No separate scanner app needed.</div>
          </div>
        </div>
      </div>
      <div class="card" style="border-color:rgba(136,120,195,0.3)">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:32px;height:32px;border-radius:50%;background:#8878c3;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#141414;flex-shrink:0">3</div>
          <div>
            <div style="font-size:15px;font-weight:700;margin-bottom:4px">Answer and earn points</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.6">Each stop has a challenge — trivia, a quick question, or a field task. Complete it to earn points. Find as many as you can.</div>
          </div>
        </div>
      </div>
      <div class="card" style="border-color:rgba(91,176,176,0.3)">
        <div style="display:flex;gap:12px;align-items:flex-start">
          <div style="width:32px;height:32px;border-radius:50%;background:#5CB0B0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#141414;flex-shrink:0">&#9733;</div>
          <div>
            <div style="font-size:15px;font-weight:700;margin-bottom:4px">Win swag</div>
            <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.6">Top scorers will be recognized and receive prizes. Complete 6 stops to unlock the final Mission Debrief.</div>
          </div>
        </div>
      </div>
      <div style="padding:12px;border-radius:8px;background:rgba(255,255,255,0.04);border:1px dashed rgba(255,255,255,0.12)">
        <div style="font-size:11px;color:rgba(255,255,255,0.65);line-height:1.6;text-align:center">Don't use private/incognito browsing — your progress won't save between stops.</div>
      </div>
    </div>
    <div style="margin-top:1.5rem">
      <button class="btn btn-primary" onclick="startMission()">Start My Mission</button>
      <div style="text-align:center;margin-top:12px;font-size:11px;color:rgba(255,255,255,0.55)">Created by the OBG Training Team &middot; SBTW 2026</div>
    </div>
  </div>`;
}

function startMission(){
  if(_urlStop&&_state.player){handleQrScan(_state.player,_urlStop);}
  else{_gameView='board';setState({screen:'game'});}
}

// ─── REGISTER ─────────────────────────────────────────────────────
function Register(){
  return`
  <div class="screen" style="justify-content:center;gap:1.5rem">
    <div>
      <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:0.75rem;font-family:'Oswald',sans-serif">AGENT REGISTRATION</div>
      <div style="font-size:26px;font-weight:700;margin-bottom:6px">Identify Yourself</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.80)">Enter your info to activate your mission</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div>
        <label style="font-size:10px;color:rgba(255,255,255,0.75);letter-spacing:2px;margin-bottom:6px;display:block;font-weight:600">FULL NAME</label>
        <input id="reg-name" placeholder="First and last name" oninput="checkReg()"/>
      </div>
      <div>
        <label style="font-size:10px;color:rgba(255,255,255,0.75);letter-spacing:2px;margin-bottom:6px;display:block;font-weight:600">APEX ACCELERATOR / ORGANIZATION</label>
        <input id="reg-team" placeholder="e.g. Virginia APEX, Ohio PTAC..." oninput="checkReg()"/>
      </div>
    </div>
    <button id="reg-btn" class="btn btn-primary" disabled onclick="doRegister()">Activate Mission</button>
    <button class="btn" style="background:none;border:none;color:rgba(255,255,255,0.5);font-size:13px" onclick="setState({screen:'landing'})">Back</button>
  </div>`;
}

function checkReg(){
  const n=document.getElementById('reg-name');
  const t=document.getElementById('reg-team');
  const b=document.getElementById('reg-btn');
  if(n&&t&&b)b.disabled=!(n.value.trim()&&t.value.trim());
}

async function doRegister(){
  const btn=document.getElementById('reg-btn');
  if(btn){btn.disabled=true;btn.textContent='Activating...';}
  const name=document.getElementById('reg-name').value.trim();
  const team=document.getElementById('reg-team').value.trim();
  if(!name||!team)return;
  const player={name,team};
  saveLocal('player',player);
  initGame(player);
  const existing=await fbGet('players/'+playerKey(name,team));
  if(existing&&existing.score!==undefined&&existing.completed&&existing.completed.length>0){
    _gameScore=existing.score;
    _gameCompleted=existing.completed;
    _gameScanned=existing.scanned||[];
    _gameAnswers=existing.answers||{};
    _preNotes=existing.preNotes||'';
    saveLocal('score_'+name,_gameScore);
    saveLocal('completed_'+name,_gameCompleted);
    saveLocal('scanned_'+name,_gameScanned);
    saveLocal('answers_'+name,_gameAnswers);
    saveLocal('preNotes_'+name,_preNotes);
  }
  setState({screen:'instructions',player});
}

// ─── QR SCAN HANDLER ──────────────────────────────────────────────
function handleQrScan(player,stopId){
  const idx=CHALLENGES.findIndex(c=>c.id===stopId);
  if(idx<0)return setState({screen:'game',player});
  const challenge=CHALLENGES[idx];
  if(!_gameScanned.includes(stopId)){
    _gameScanned=[..._gameScanned,stopId];
    saveGame(player);
  }
  if(_gameCompleted.includes(stopId)){setState({screen:'game',player});return;}
  const nonLockedDone=CHALLENGES.filter(c=>!c.locked&&_gameCompleted.includes(c.id)).length;
  if(challenge.locked&&nonLockedDone<UNLOCK_THRESHOLD){setState({screen:'game',player});return;}
  _gameIdx=idx;
  _gameView='challenge';
  _mcSelected=null;_tfAnswer=null;_revealed=false;_gameFeedback=null;
  setState({screen:'game',player});
}

// ─── GAME ─────────────────────────────────────────────────────────
function Game(){
  if(!_state.player)return'';
  const completedSet=new Set(_gameCompleted);
  const scannedSet=new Set(_gameScanned);
  const nonLockedDone=CHALLENGES.filter(c=>!c.locked&&completedSet.has(c.id)).length;

  if(_gameView==='board'){
    const canFinish=completedSet.size>=TOTAL_STOPS;
    const unscannedCount=CHALLENGES.filter(c=>!scannedSet.has(c.id)&&!c.locked).length;
    const remaining=UNLOCK_THRESHOLD-nonLockedDone;
    return`
    <div class="screen">
      <div style="margin-bottom:1.25rem">
        <div style="font-size:10px;letter-spacing:2px;color:rgba(255,255,255,0.75);font-weight:600;margin-bottom:4px;font-family:'Oswald',sans-serif">MISSION BOARD</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${Math.round((completedSet.size/TOTAL_STOPS)*100)}%"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:5px">
          <div style="font-size:11px;color:rgba(255,255,255,0.65)">${completedSet.size} of ${TOTAL_STOPS} complete</div>
          ${nonLockedDone<UNLOCK_THRESHOLD
            ?`<div style="font-size:11px;color:rgba(255,255,255,0.65)">${remaining} more to unlock stop 7</div>`
            :'<div style="font-size:11px;color:#5CB0B0;font-weight:600">&#10003; Stop 7 unlocked</div>'}
        </div>
      </div>
      ${unscannedCount>0?`
      <div style="background:rgba(136,120,195,0.12);border:1px solid rgba(136,120,195,0.3);border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:rgba(255,255,255,0.85);line-height:1.5">
        <strong style="color:#8878c3">${unscannedCount} stop${unscannedCount>1?'s':''} not yet found.</strong> Keep scanning QR codes around the venue to unlock them.
      </div>`:''}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;flex:1">
        ${CHALLENGES.map(c=>{
          const done=completedSet.has(c.id);
          const scanned=scannedSet.has(c.id);
          const locked7=c.locked&&nonLockedDone<UNLOCK_THRESHOLD;
          const unscanned=!scanned&&!locked7;
          const color=CAT_COLOR[c.cat];
          let cls='stop-card ';
          let onclick='';
          if(done){cls+='done';onclick=`selectStop(${CHALLENGES.indexOf(c)})`;}
          else if(locked7){cls+='locked';}
          else if(unscanned){cls+='unscanned';}
          else{cls+='available';onclick=`selectStop(${CHALLENGES.indexOf(c)})`;}
          const numColor=done?color:'rgba(255,255,255,0.5)';
          const titleColor=done||(!unscanned&&!locked7)?'#ffffff':locked7?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.75)';
          const labelColor=done?color:unscanned?'#8878c3':locked7?'rgba(255,255,255,0.3)':'rgba(255,255,255,0.5)';
          const cardBg=done?color+'18':locked7?'rgba(255,255,255,0.02)':'rgba(255,255,255,0.06)';
          const cardBorder=done?color:locked7?'rgba(255,255,255,0.08)':unscanned?'rgba(136,120,195,0.35)':'rgba(255,255,255,0.15)';
          return`<div class="${cls}" ${onclick?`onclick="${onclick}"`:''}
            style="border:1px ${unscanned?'dashed':'solid'} ${cardBorder};background:${cardBg};opacity:${locked7?'0.5':'1'}">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
              <span style="font-size:10px;font-weight:700;letter-spacing:1px;color:${numColor}">${String(c.id).padStart(2,'0')}</span>
              ${done?`<span style="color:${color};font-size:13px">&#10003;</span>`:locked7?`<span style="font-size:11px;color:rgba(255,255,255,0.65)">&#128274;</span>`:unscanned?`<span style="font-size:11px;color:#8878c3">&#128247;</span>`:`<span style="font-size:10px;color:rgba(255,255,255,0.75)">${c.pts}pts</span>`}
            </div>
            <div style="font-size:12px;font-weight:600;line-height:1.3;color:${titleColor}">${c.title}</div>
            <div style="font-size:10px;margin-top:4px;letter-spacing:0.5px;text-transform:uppercase;font-weight:600;color:${labelColor}">${done?'complete':locked7?'locked':unscanned?'scan to unlock':CAT_LABEL[c.cat]}</div>
          </div>`;
        }).join('')}
      </div>
      ${canFinish
        ?`<button class="btn btn-primary" style="margin-top:12px" onclick="finishMission()">Submit Mission</button>`
        :`<div style="margin-top:12px;text-align:center;font-size:12px;color:rgba(255,255,255,0.5)">Find &amp; scan QR codes to unlock stops</div>`}
    </div>`;
  }

  const challenge=CHALLENGES[_gameIdx];
  const nonLockedDone2=CHALLENGES.filter(c=>!c.locked&&new Set(_gameCompleted).has(c.id)).length;
  const isLocked=challenge.locked&&nonLockedDone2<UNLOCK_THRESHOLD;
  const color=CAT_COLOR[challenge.cat];
  let body='';

  if(isLocked){
    body=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:1rem;text-align:center;padding:2rem">
      <div style="font-size:48px;opacity:0.35">&#128274;</div>
      <div style="font-size:18px;font-weight:700">Stop 7 is locked</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.80);line-height:1.7">Complete all 6 other stops first to unlock the final mission debrief.</div>
      <div style="font-size:13px;color:#8878c3">${nonLockedDone2} / ${UNLOCK_THRESHOLD} done</div>
      <button class="btn btn-secondary" style="margin-top:1rem" onclick="backToBoard()">Back to Mission Board</button>
    </div>`;
  } else if(_gameView==='challenge'){
    let input='';
    if(challenge.type==='text'){
      input=`<textarea id="text-ans" rows="4" style="resize:none" placeholder="${challenge.placeholder||''}" oninput="document.getElementById('sub-btn').disabled=this.value.trim().length<3"></textarea>`;
    } else if(challenge.type==='mc'){
      input=challenge.options.map((opt,i)=>{
        let cls='choice-btn';
        if(_revealed){if(i===challenge.correct)cls+=' correct';else if(i===_mcSelected)cls+=' wrong';}
        else if(i===_mcSelected)cls+=' selected';
        return`<button class="${cls}" onclick="selectMC(${i})" ${_revealed?'disabled':''}><span style="color:rgba(255,255,255,0.65);margin-right:10px;font-size:11px;font-weight:700">${'ABCD'[i]}</span>${opt}</button>`;
      }).join('');
      if(_revealed&&challenge.explain)input+=`<div style="font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;margin-top:8px;padding:10px;background:rgba(255,255,255,0.06);border-radius:8px">${challenge.explain}</div>`;
    } else if(challenge.type==='tf'){
      input=`<div class="tf-row">${[true,false].map(v=>{
        let cls='choice-btn';
        if(_revealed){if(v===challenge.correct)cls+=' correct';else if(_tfAnswer===v)cls+=' wrong';}
        else if(_tfAnswer===v)cls+=' selected';
        return`<button class="${cls}" style="text-align:center" onclick="selectTF(${v})" ${_revealed?'disabled':''}>${v?'True':'False'}</button>`;
      }).join('')}</div>`;
      if(_revealed&&challenge.explain)input+=`<div style="font-size:13px;color:rgba(255,255,255,0.75);line-height:1.6;margin-top:8px;padding:10px;background:rgba(255,255,255,0.06);border-radius:8px">${challenge.explain}</div>`;
    }
    const canSub=challenge.type==='mc'?_mcSelected!==null&&!_revealed:challenge.type==='tf'?_tfAnswer!==null&&!_revealed:true;
    body=`
    <div class="card" style="border-color:${color}44;margin-bottom:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem">
        <span class="tag" style="background:${color}22;color:${color}">${CAT_LABEL[challenge.cat]}</span>
        <span style="font-size:13px;color:${color};font-weight:700">${challenge.pts} pts</span>
      </div>
      <div style="font-size:20px;font-weight:700;margin-bottom:0.5rem">${challenge.title}</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.85);line-height:1.7">${challenge.desc}</div>
    </div>
    ${input}
    ${!_revealed?`<button id="sub-btn" class="btn btn-primary" style="margin-top:auto" ${!canSub?'disabled':''} onclick="submitAnswer()">Submit</button>`:''}`;
  } else if(_gameView==='feedback'&&_gameFeedback){
    const won=_gameFeedback.pts>0;
    body=`<div style="flex:1;display:flex;flex-direction:column;justify-content:center;gap:1.5rem">
      <div style="text-align:center">
        <div style="font-size:52px;margin-bottom:0.5rem">${won?'&#10003;':'&#8594;'}</div>
        <div style="font-size:22px;font-weight:700;margin-bottom:6px">${won?'+'+_gameFeedback.pts+' points!':'Response recorded'}</div>
        <div style="font-size:14px;color:rgba(255,255,255,0.80);line-height:1.6">${challenge.type==='text'?'Filed. Keep hunting.':won?'Correct — well done.':'Keep going.'}</div>
      </div>
      <div class="card">
        <div style="font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:2px;margin-bottom:6px;font-weight:600">YOUR ANSWER</div>
        <div style="font-size:14px;line-height:1.6;color:rgba(255,255,255,0.85)">${typeof _gameFeedback.ans==='boolean'?(_gameFeedback.ans?'True':'False'):_gameFeedback.ans||'—'}</div>
      </div>
      <div style="display:flex;justify-content:space-between;padding:0 4px">
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#8878c3">${_gameScore}</div><div style="font-size:11px;color:rgba(255,255,255,0.65)">total pts</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#8878c3">${_gameCompleted.length}</div><div style="font-size:11px;color:rgba(255,255,255,0.65)">done</div></div>
        <div style="text-align:center"><div style="font-size:22px;font-weight:700;color:#5CB0B0">${TOTAL_STOPS-_gameCompleted.length}</div><div style="font-size:11px;color:rgba(255,255,255,0.65)">left</div></div>
      </div>
      <button class="btn btn-primary" onclick="backToBoard()">Back to Mission Board</button>
    </div>`;
  }

  return`<div class="screen">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:1.25rem">
      <button onclick="backToBoard()" style="background:none;border:none;color:rgba(255,255,255,0.75);cursor:pointer;font-size:22px;padding:0;line-height:1">&#8592;</button>
      <div style="flex:1"><div style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:1px">STOP ${String(challenge.id).padStart(2,'0')} &middot; ${CAT_LABEL[challenge.cat].toUpperCase()}</div></div>
      <div style="font-size:13px;color:#8878c3;font-weight:700">${_gameScore} pts</div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column">${body}</div>
  </div>`;
}

function selectStop(i){_gameIdx=i;_gameView='challenge';_mcSelected=null;_tfAnswer=null;_revealed=false;_gameFeedback=null;render();}
function backToBoard(){_gameView='board';render();}
function selectMC(i){if(_revealed)return;_mcSelected=i;render();}
function selectTF(v){if(_revealed)return;_tfAnswer=v;render();}

function submitAnswer(){
  const c=CHALLENGES[_gameIdx];
  let pts=0,ans='';
  if(c.type==='text'){
    const el=document.getElementById('text-ans');
    ans=el?el.value.trim():'';pts=c.pts;
  } else if(c.type==='mc'){
    _revealed=true;ans=c.options[_mcSelected];pts=_mcSelected===c.correct?c.pts:0;render();
    setTimeout(()=>finalizeSubmit(pts,ans),1500);return;
  } else if(c.type==='tf'){
    _revealed=true;ans=_tfAnswer;pts=_tfAnswer===c.correct?c.pts:0;render();
    setTimeout(()=>finalizeSubmit(pts,ans),1500);return;
  }
  finalizeSubmit(pts,ans);
}

function finalizeSubmit(pts,ans){
  const c=CHALLENGES[_gameIdx];
  _gameCompleted=[...new Set([..._gameCompleted,c.id])];
  _gameScore+=pts;
  _gameAnswers={..._gameAnswers,[c.id]:ans};
  saveGame(_state.player);
  _gameFeedback={pts,ans};_gameView='feedback';render();
}

function finishMission(){
  const data={name:_state.player.name,team:_state.player.team,score:_gameScore,completed:_gameCompleted.length,answers:_gameAnswers,timestamp:Date.now()};
  fbPush('leaderboard',data);
  fbSet('players/'+playerKey(_state.player.name,_state.player.team),{
    name:_state.player.name,team:_state.player.team,score:_gameScore,
    completed:_gameCompleted,scanned:_gameScanned,answers:_gameAnswers,
    preNotes:_preNotes,finished:true,lastSaved:Date.now()
  });
  setState({screen:'complete',result:{score:_gameScore,completed:_gameCompleted,answers:_gameAnswers}});
}

// ─── COMPLETE ─────────────────────────────────────────────────────
function Complete(){
  if(!_state.result||!_state.player)return'';
  const {score,completed}=_state.result;
  const pct=Math.round((score/TOTAL_PTS)*100);
  const tier=score>=400?'Top Operative':score>=250?'Field Agent':'Cadet';
  return`<div class="screen" style="justify-content:space-between;padding-top:3rem;padding-bottom:2rem">
    <div>
      <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:0.75rem;font-family:'Oswald',sans-serif">MISSION COMPLETE</div>
      <div style="font-size:32px;font-weight:700;margin-bottom:4px">${_state.player.name}</div>
      <div style="font-size:14px;color:rgba(255,255,255,0.80);margin-bottom:2rem">${_state.player.team}</div>
      <div style="display:flex;align-items:baseline;gap:8px;margin-bottom:6px">
        <span style="font-size:80px;font-weight:800;color:#8878c3;line-height:1;font-family:'Oswald',sans-serif">${score}</span>
        <span style="font-size:20px;color:rgba(255,255,255,0.65)">/ ${TOTAL_PTS}</span>
      </div>
      <div style="width:50px;height:3px;background:#8878c3;border-radius:2px;margin-bottom:1.5rem"></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        ${[{l:'Stops completed',v:`${completed.length} / ${TOTAL_STOPS}`},{l:'Score',v:`${pct}%`},{l:'Rating',v:tier},{l:'Status',v:'Filed'}].map(s=>`
          <div class="card">
            <div style="font-size:10px;color:rgba(255,255,255,0.65);letter-spacing:1.5px;margin-bottom:4px;font-weight:600">${s.l.toUpperCase()}</div>
            <div style="font-size:15px;font-weight:600">${s.v}</div>
          </div>`).join('')}
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-top:2rem">
      <button class="btn btn-teal" onclick="setState({screen:'notes'})">&#128196; Download My Field Notes</button>
      <button class="btn btn-primary" onclick="setState({screen:'leaderboard'})">View Leaderboard</button>
    </div>
  </div>`;
}

// ─── NOTES SCREEN ─────────────────────────────────────────────────

  if(!_state.player)return'';
  return`<div class="screen" style="padding-bottom:2rem">
    <div style="margin-bottom:1.25rem">
      <div style="font-size:10px;letter-spacing:3px;color:#5CB0B0;font-weight:700;margin-bottom:4px;font-family:'Oswald',sans-serif">OPERATION APEX · FIELD NOTES</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:2px">${_state.player.name}</div>
      <div style="font-size:13px;color:rgba(255,255,255,0.65)">${_state.player.team} · SBTW 2026</div>
    </div>
    <div class="card" style="margin-bottom:1rem;border-color:rgba(91,176,176,0.3)">
      <div style="font-size:10px;letter-spacing:2px;color:#5CB0B0;font-weight:700;margin-bottom:8px">PRE-CONFERENCE NOTES <span style="font-weight:400;color:rgba(255,255,255,0.4);letter-spacing:0">(optional)</span></div>
      <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:8px;line-height:1.5">What were you hoping to learn or accomplish at SBTW? These will appear at the top of your downloaded document.</div>
      <textarea id="prenotes-input" rows="3" style="resize:none;font-size:13px" placeholder="Goals, questions you wanted answered, topics you were tracking..."
        oninput="savePreNotes(this.value)">${_preNotes||''}</textarea>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;font-weight:600">Your Responses</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem">
      ${CHALLENGES.filter(c=>_gameAnswers[c.id]!==undefined).map(c=>{
        const ans=_gameAnswers[c.id];
        const color=CAT_COLOR[c.cat];
        const isQuiz=c.type==='mc'||c.type==='tf';
        const correctAns=c.type==='mc'?c.options[c.correct]:c.type==='tf'?(c.correct?'True':'False'):null;
        const userAns=typeof ans==='boolean'?(ans?'True':'False'):ans;
        const gotIt=c.type==='mc'?ans===c.options[c.correct]:c.type==='tf'?ans===c.correct:true;
        return`<div class="card" style="border-color:${color}33">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:10px;font-weight:700;color:${color}">STOP ${String(c.id).padStart(2,'0')}</span>
              <span class="tag" style="background:${color}18;color:${color};padding:2px 7px">${CAT_LABEL[c.cat]}</span>
            </div>
            ${isQuiz?`<span style="font-size:11px;font-weight:700;color:${gotIt?'#22c55e':'#ef4444'}">${gotIt?'✓ Correct':'✗ Incorrect'}</span>`:''}
          </div>
          <div style="font-size:13px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:4px">${c.title}</div>
          <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:3px;letter-spacing:1px;text-transform:uppercase;font-weight:600">Your answer</div>
          <div style="font-size:13px;color:rgba(255,255,255,0.85);line-height:1.5">${userAns}</div>
          ${isQuiz&&correctAns?`<div style="margin-top:6px;font-size:12px;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;font-weight:600">Correct answer</div>
          <div style="font-size:13px;color:#5CB0B0;font-weight:600">${correctAns}</div>`:''}
        </div>`;
      }).join('')}
      ${Object.keys(_gameAnswers).length===0?`<div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;font-size:14px">No stops completed yet.</div>`:''}
    </div>
    <button class="btn btn-teal" onclick="downloadNotes()" style="margin-bottom:10px">&#128229; Save / Print as PDF</button>
    <button class="btn btn-secondary" onclick="setState({screen:_state.result?'complete':'game'})">Back</button>

}

function savePreNotes(val){
  _preNotes=val;
  if(_state.player){
    saveLocal('preNotes_'+_state.player.name,_preNotes);
    fbSet('players/'+playerKey(_state.player.name,_state.player.team)+'/preNotes',_preNotes);
  }
}

function downloadNotes(){
  if(!_state.player)return;
  const p=_state.player;
  const date=new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'});
  const catColors={action:'#6b5fa8',knowledge:'#7b6db0',intel:'#3d8f8f'};
  const catBg={action:'#f0eef8',knowledge:'#f3f1f9',intel:'#e8f5f5'};
  const rows=CHALLENGES.filter(c=>_gameAnswers[c.id]!==undefined).map(c=>{
    const ans=_gameAnswers[c.id];
    const isQuiz=c.type==='mc'||c.type==='tf';
    const correctAns=c.type==='mc'?c.options[c.correct]:c.type==='tf'?(c.correct?'True':'False'):null;
    const userAns=typeof ans==='boolean'?(ans?'True':'False'):String(ans);
    const gotIt=c.type==='mc'?ans===c.options[c.correct]:c.type==='tf'?ans===c.correct:true;
    const catCol=catColors[c.cat]||'#6b5fa8';
    const catBgCol=catBg[c.cat]||'#f0eef8';
    return`<div style="margin-bottom:20px;border:1px solid #e0ddf0;border-radius:10px;overflow:hidden;page-break-inside:avoid">
      <div style="background:${catBgCol};padding:10px 14px;border-bottom:2px solid ${catCol};display:flex;justify-content:space-between;align-items:center">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="font-size:11px;font-weight:700;color:${catCol}">STOP ${String(c.id).padStart(2,'0')}</span>
          <span style="font-size:13px;font-weight:700;color:#2d2d2d">${c.title}</span>
        </div>
        ${isQuiz?`<span style="font-size:11px;font-weight:700;color:${gotIt?'#16a34a':'#dc2626'}">${gotIt?'✓ Correct':'✗ Incorrect'}</span>`:`<span style="font-size:11px;color:#888">+${c.pts} pts</span>`}
      </div>
      <div style="padding:12px 14px;background:#fff">
        <div style="font-size:12px;color:#555;line-height:1.6;margin-bottom:10px;font-style:italic">${c.desc}</div>
        <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Your Answer</div>
        <div style="font-size:13px;color:#1a1a1a;line-height:1.5;margin-bottom:${isQuiz?'10px':'0'}">${userAns}</div>
        ${isQuiz&&correctAns?`<div style="font-size:11px;font-weight:700;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:4px">Correct Answer</div>
        <div style="font-size:13px;font-weight:600;color:${catCol};margin-bottom:${c.explain?'8px':'0'}">${correctAns}</div>
        ${c.explain?`<div style="font-size:12px;color:#444;line-height:1.6;padding:8px 10px;background:#f8f7fd;border-radius:5px;border-left:3px solid ${catCol}">${c.explain}</div>`:''}
        `:''}
      </div>
    </div>`;
  }).join('');
  const preBlock=_preNotes?`<div style="margin-bottom:24px;border:1px solid #b8e0e0;border-radius:10px;overflow:hidden">
    <div style="background:#e8f5f5;padding:10px 14px;border-bottom:2px solid #3d8f8f"><span style="font-size:11px;font-weight:700;color:#3d8f8f;letter-spacing:1px">PRE-CONFERENCE NOTES</span></div>
    <div style="padding:12px 14px;background:#fff;font-size:13px;color:#1a1a1a;line-height:1.7;white-space:pre-wrap">${_preNotes.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</div>
  </div>`:'';
  const html=`<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Operation APEX Field Notes — ${p.name}</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>*{box-sizing:border-box;margin:0;padding:0}body{background:#fff;color:#1a1a1a;font-family:'Lato',Arial,sans-serif;font-size:14px}
  .page{max-width:760px;margin:0 auto;padding:40px 32px}
  @media print{.page{padding:24px 28px;max-width:100%}.no-print{display:none!important}@page{margin:1.5cm;size:letter}}</style>
  </head><body><div class="page">
  <div style="border-bottom:3px solid #8878c3;padding-bottom:20px;margin-bottom:24px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:10px;letter-spacing:3px;color:#5CB0B0;font-weight:700;margin-bottom:4px;font-family:'Oswald',sans-serif">DEPARTMENT OF WAR · OFFICE OF INDUSTRIAL BASE GROWTH</div>
        <div style="font-size:10px;letter-spacing:3px;color:#888;font-weight:600;margin-bottom:6px">SBTW 2026</div>
        <div style="font-size:36px;font-weight:700;color:#8878c3;font-family:'Oswald',sans-serif">OPERATION APEX</div>
        <div style="font-size:18px;color:#444;letter-spacing:2px;font-family:'Oswald',sans-serif">FIELD NOTES</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:14px;font-weight:700">${p.name}</div>
        <div style="font-size:12px;color:#555;margin-top:2px">${p.team}</div>
        <div style="font-size:11px;color:#888;margin-top:2px">${date}</div>
        <div style="margin-top:8px;display:inline-block;background:#8878c3;color:#fff;padding:4px 12px;border-radius:4px;font-size:13px;font-weight:700">${_gameScore} / ${TOTAL_PTS} pts</div>
      </div>
    </div>
  </div>
  <div style="background:#f8f7fd;border:1px solid #e0ddf0;border-radius:8px;padding:14px 16px;margin-bottom:24px;font-size:13px;color:#444;line-height:1.7">These notes were captured during the SBTW 2026 Operation APEX scavenger hunt. Use them to share key takeaways with your team.</div>
  ${preBlock}
  <div style="font-size:11px;font-weight:700;color:#888;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid #eee">Conference Responses</div>
  ${rows||'<p style="color:#888;font-style:italic">No responses recorded.</p>'}
  <div style="margin-top:32px;padding-top:16px;border-top:1px solid #eee;display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px">
    <div style="font-size:11px;color:#aaa">Created by the OBG Training Team · SBTW 2026</div>
    <div style="font-size:11px;color:#aaa">Operation APEX · ${p.name}</div>
  </div>
  <div class="no-print" style="margin-top:24px;text-align:center">
    <button onclick="window.print()" style="background:#8878c3;color:#fff;border:none;border-radius:8px;padding:12px 32px;font-size:15px;font-weight:600;cursor:pointer">Print / Save as PDF</button>
    <div style="margin-top:10px;font-size:12px;color:#888">On your phone: tap share and choose <strong>Save to Files</strong> or <strong>Print</strong>.</div>
  </div>
  </div></body></html>`;
  const w=window.open('','_blank');
  if(w){w.document.write(html);w.document.close();}
  else{alert('Please allow pop-ups to open your field notes.');}
}

// ─── LEADERBOARD ──────────────────────────────────────────────────
function LeaderboardShell(){
  const back=_state.result?'complete':'landing';
  return`<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem">
      <div>
        <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:4px;font-family:'Oswald',sans-serif">OPERATION APEX</div>
        <div style="font-size:20px;font-weight:700">Leaderboard</div>
      </div>
      <button onclick="setState({screen:'${back}'})" style="background:none;border:none;color:rgba(255,255,255,0.75);cursor:pointer;font-size:13px">Back</button>
    </div>
    <div id="lb-container"><div style="text-align:center;color:rgba(255,255,255,0.5);padding:2rem;font-size:14px">Loading...</div></div>
  </div>`;
}

async function Leaderboard(){
  const el=document.getElementById('lb-container');if(!el)return;
  const data=await fbGet('leaderboard');
  const entries=data?Object.values(data).sort((a,b)=>b.score-a.score):[];
  const medals=['1st','2nd','3rd'];
  el.innerHTML=entries.length===0
    ?`<div style="text-align:center;color:rgba(255,255,255,0.65);padding:3rem 1rem;font-size:14px;line-height:1.8">No submissions yet.<br>Be the first to finish!</div>`
    :entries.map((e,i)=>`<div class="card" style="margin-bottom:8px;border-color:${i===0?'#8878c3':i===1?'#5CB0B0':i===2?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.07)'}">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="display:flex;align-items:center;gap:8px">
            ${i<3?`<span style="font-size:10px;font-weight:700;letter-spacing:1px;color:${i===0?'#8878c3':i===1?'#5CB0B0':'rgba(255,255,255,0.5)'}">${medals[i]}</span>`:''}
            <div style="font-size:15px;font-weight:600">${e.name}</div>
          </div>
          <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-top:2px">${e.team} &middot; ${e.completed||0}/${TOTAL_STOPS} stops</div>
        </div>
        <div style="text-align:right">
          <div style="font-size:24px;font-weight:800;color:#8878c3">${e.score}</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.5)">points</div>
        </div>
      </div>
    </div>`).join('');
}

// ─── ADMIN ────────────────────────────────────────────────────────
let _adminAuthed=false,_adminPass='';
function AdminShell(){
  if(!_adminAuthed)return`<div class="screen" style="justify-content:center;gap:1rem">
    <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:0.5rem;font-family:'Oswald',sans-serif">ORGANIZER ACCESS</div>
    <div style="font-size:22px;font-weight:700;margin-bottom:0.5rem">Secure Login</div>
    <input id="admin-pass" type="password" placeholder="Enter passcode" oninput="_adminPass=this.value" onkeydown="if(event.key==='Enter')tryAdminAuth()"/>
    <button class="btn btn-primary" onclick="tryAdminAuth()">Enter</button>
    <button onclick="setState({screen:'landing'})" style="background:none;border:none;color:rgba(255,255,255,0.65);cursor:pointer;font-size:13px">Cancel</button>
  </div>`;
  return`<div class="screen">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem">
      <div>
        <div style="font-size:10px;letter-spacing:3px;color:#8878c3;font-weight:700;margin-bottom:4px;font-family:'Oswald',sans-serif">ORGANIZER DASHBOARD</div>
        <div style="font-size:18px;font-weight:700">All Submissions</div>
      </div>
      <button onclick="_adminAuthed=false;setState({screen:'landing'})" style="background:none;border:none;color:rgba(255,255,255,0.65);cursor:pointer;font-size:13px">Exit</button>
    </div>
    <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:1rem">Passcode: ${ADMIN_PASS} — change before the conference</div>
    <div id="admin-list"><div style="color:rgba(255,255,255,0.5);font-size:14px">Loading...</div></div>
  </div>`;
}

async function Admin(){
  const el=document.getElementById('admin-list');if(!el)return;
  const data=await fbGet('leaderboard');
  const entries=data?Object.values(data).sort((a,b)=>b.score-a.score):[];
  if(!entries.length){el.innerHTML='<div style="color:rgba(255,255,255,0.65);font-size:14px">No submissions yet.</div>';return;}
  el.innerHTML=entries.map(e=>`<div style="padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.07)">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px">
      <div style="font-weight:600;font-size:14px">${e.name}</div>
      <div style="color:#8878c3;font-weight:700;font-size:16px">${e.score} pts</div>
    </div>
    <div style="font-size:12px;color:rgba(255,255,255,0.65);margin-bottom:8px">${e.team} &middot; ${e.completed||0}/${TOTAL_STOPS} stops &middot; ${new Date(e.timestamp).toLocaleDateString()}</div>
    ${e.answers?`<details><summary>View responses (${Object.keys(e.answers).length})</summary>
      <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px">
        ${Object.entries(e.answers).map(([id,ans])=>{
          const ch=CHALLENGES.find(c=>c.id===Number(id));
          return ch?`<div style="padding:8px;background:rgba(255,255,255,0.04);border-radius:6px;font-size:12px">
            <div style="color:rgba(255,255,255,0.65);margin-bottom:3px">${ch.title}</div>
            <div style="color:rgba(255,255,255,0.85)">${typeof ans==='boolean'?String(ans):ans}</div>
          </div>`:'';
        }).join('')}
      </div></details>`:''}
  </div>`).join('');
}

function tryAdminAuth(){
  if(_adminPass===ADMIN_PASS){_adminAuthed=true;render();}
  else{const el=document.getElementById('admin-pass');if(el){el.style.borderColor='#ef4444';el.value='';_adminPass='';}}
}

function navBar(showHome=true){
  if(!showHome)return'';
  const label=_state.player?_state.player.name.split(' ')[0]:'';
  return`<div class="nav-bar">
    <button class="nav-home" onclick="setState({screen:'landing'})">&#8592; OPERATION APEX</button>
    ${label?`<div style="font-size:11px;color:rgba(255,255,255,0.5)">${label}</div>`:''}
    ${_state.screen==='game'?`<div style="font-size:12px;color:#8878c3;font-weight:700">${_gameScore} pts</div>`:'<div></div>'}
  </div>`;
}

function render(){
  const root=document.getElementById('root');
  const s=_state.screen;
  const nav=s!=='landing'?navBar():'';
  if(s==='landing')root.innerHTML=Landing();
  else if(s==='register')root.innerHTML=nav+Register();
  else if(s==='instructions')root.innerHTML=nav+Instructions();
  else if(s==='game')root.innerHTML=nav+Game();
  else if(s==='complete')root.innerHTML=nav+Complete();
  else if(s==='notes')root.innerHTML=nav+Notes();
  else if(s==='leaderboard'){root.innerHTML=nav+LeaderboardShell();Leaderboard();}
  else if(s==='admin'){root.innerHTML=nav+AdminShell();if(_adminAuthed)Admin();}
}

// ─── BOOT ─────────────────────────────────────────────────────────
const _savedPlayer=loadLocal('player',null);
if(_savedPlayer){
  initGame(_savedPlayer);
  _state.player=_savedPlayer;
  if(_urlStop){handleQrScan(_savedPlayer,_urlStop);}
  else{setState({screen:'game',player:_savedPlayer});}
  syncFromFirebase(_savedPlayer);
}else if(_urlStop){
  setState({screen:'register'});
}else{
  render();
}
</script>
</body>
</html>
